<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Prism - контроль, мониторинг</title>

    <!-- фавикон -->
    <!-- Стандартный favicon (ICO формат) -->
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    
    <!-- Для современных браузеров -->
    <link rel="icon" type="image/png" sizes="32x32" href="img\favicon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="img\favicon.png">
    
    <!-- Для Apple устройств -->
    <link rel="apple-touch-icon" sizes="180x180" href="img\favicon.png">
    
    <!-- Для Android -->
    <link rel="icon" type="image/png" sizes="192x192" href="img\favicon.png">
    <link rel="icon" type="image/png" sizes="512x512" href="img\favicon.png">

</head>
<body>

<header>
<div id="notification">
    <img src="/img/notification (2).png" alt="Уведомления" class="notific">
    <p class="uveda" style="display: none;">0</p> <div id="notification-list" class="notif-popup-container"></div>
</div>
  <span class="tooltip-notif">Уведомления</span>

  <button id="exit">
    <img src="img/exit logo.png" alt="Выход">
  </button>
  <span class="tooltip">Выйти из аккаунта</span>

  <div class="prof-photo">
    <img src="/img/avatar.png" alt="Аватар">
    <p id="name"> </p></div>
    <span class="tooltip-prof">Профиль</span>
</header>


<section id="prism">
    <h1>PRISM</h1>
</section>

<section id="prism2">
    <h1>PRISM</h1>
</section>

  <section class="content">
      <h2>ваши подписки:</h2>
    
    <div class="switcher">
  <button id="switcher-btn-active" class="active-btn" data-target="content-box">Активные</button>
  <button id="switcher-btn-history" data-target="history-box">История</button>
    </div>

   

   <!-- Модальное окно аналитики -->
<div id="analytics-modal" class="analytics-modal">
  <div class="analytics-content">
    <div class="analytics-switcher">
      <button data-view="service" class="view-btn active">Общее</button>
      <button data-view="activity" class="view-btn">Сравнение</button>
    </div>
    <div id="chart-container"></div>
    <div id="summary-stats"></div>
    <button id="close-analytics" class="close-btn">Закрыть</button>
  </div>
</div>
<!-- '''''''''''''''''''' -->

<div id="content-box" class="panel show">
  <button id="analytics-btn" class="analytics-trigger">Аналитика затрат</button> 

  <div class="txt">
    <p>Подписка</p> 
    <p>Дата покупки</p> 
    <p>Действует до</p>
    <p>Цена</p>
  </div>

  <div id="active-subs-container"></div>
  
  </div>

<div id="history-box" class="panel">
  <div class="txt">
    <p>Подписка</p> 
    <p>Дата покупки</p> 
    <p>Действует до</p>
    <p>Цена</p>
  </div>

  <div id="history-subs-container"></div>
  
  </div>
<!-- история подписок -->

</div>

  </section>

    
<div id="login-overlay">
  <div class="modal">
    <h2>Вход в аккаунт</h2>
    <form id="login-form">
      <input type="email" name="email" placeholder="Email" required />
      <input type="password" name="password" placeholder="Пароль" required minlength="6" />
      <button type="submit">Войти</button>
    </form>
    <button type="button" id="open-register">Регистрация</button>
  </div>
</div>

<div id="register-overlay">
  <div class="modal">
    <h2>Регистрация</h2>
    <form id="register-form">
      <input type="email" name="email" placeholder="Email" required />
      <input type="password" name="password" placeholder="Пароль" required minlength="6" />
      <input type="password" name="confirm-password" placeholder="Подтверждение пароля" required />
      <input type="password" name="app-password" placeholder="Пароль доступа приложений" required />
      <button type="submit">Подтвердить</button>
    </form>
    <button type="button" id="back-to-login">Уже есть аккаунт?<br> Войти</button>
  </div>
</div>


<footer>2026©</footer>

    <script src="index.js"></script>
</body>
</html>
